<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON SERPENT — Retrowave Games</title>
  <meta name="description" content="NEON SERPENT – guide your glowing snake through the void. Eat, grow, survive." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://2026retrowavegames-jpg.github.io/snake.html" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00ffff;
      --pink: #ff6ec7;
      --yellow: #ffff00;
      --green: #00ff88;
      --purple: #b400ff;
      --bg: #0a0015;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: bloom-pulse 4s ease-in-out infinite;
    }

    @keyframes bloom-pulse {
      0%,100% { filter: drop-shadow(0 0 6px #00ffff55) drop-shadow(0 0 10px #ff00ff22); }
      50%      { filter: drop-shadow(0 0 10px #00ffff88) drop-shadow(0 0 14px #ff00ff33); }
    }
    .main-menu-btn {
    position: fixed;      /* stays on the page, not inside game */
    top: 15px;
    left: 15px;
    padding: 8px 14px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: #ff66cc;
    background: rgba(0,0,0,0.4);
    border: 1px solid #ff66cc;
    border-radius: 4px;
    cursor: pointer;
    z-index: 99999;       /* above everything */
    transition: 0.2s ease;
}

.main-menu-btn:hover {
    background: rgba(255,102,204,0.2);
    box-shadow: 0 0 8px #ff66cc;
}

    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 22% 7%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 4%,  rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 68% 16%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 83% 9%,  rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 91% 26%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 58% 28%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
    }

    .sun {
      position: fixed; top: 6%; left: 50%; transform: translateX(-50%);
      width: 120px; height: 120px; border-radius: 50%;
      background: linear-gradient(to bottom, #ff6ec7 0%, #ff9d00 55%, #ff6ec7 100%);
      z-index: 1; overflow: hidden; pointer-events: none;
    }
    .sun-stripe { position: absolute; left: 0; right: 0; background: var(--bg); }
    .sun-stripe:nth-child(1) { top: 55%; height: 6px; }
    .sun-stripe:nth-child(2) { top: 67%; height: 8px; }
    .sun-stripe:nth-child(3) { top: 80%; height: 10px; }
    .sun-stripe:nth-child(4) { top: 93%; height: 13px; }

    .grid-floor {
      position: fixed; bottom: 0; left: 0; right: 0; height: 40%;
      z-index: 0; pointer-events: none;
      background:
        linear-gradient(to bottom, transparent 0%, rgba(180,0,255,0.15) 100%),
        linear-gradient(#00ffff22 1px, transparent 1px),
        linear-gradient(90deg, #00ffff22 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      transform-origin: top center;
      transform: perspective(500px) rotateX(55deg);
      animation: grid-move 1.2s linear infinite;
    }
    @keyframes grid-move {
      from { background-position: 0 0, 0 0, 0 0; }
      to   { background-position: 0 0, 0 120px, 0 120px; }
    }

    /* ── layout ── */
    .game-wrapper {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      gap: 0.6rem;
    }

    .header-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 460px; max-width: 96vw;
    }

    .game-title {
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,136,0.3);
    }

    .score-board { display: flex; gap: 1.5rem; }
    .score-item { text-align: right; }
    .score-label {
      font-size: 0.42rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .score-value {
      font-size: 0.85rem; font-weight: 700;
      color: var(--green); text-shadow: 0 0 10px var(--green);
    }

    /* ── canvas wrapper ── */
    .canvas-wrapper {
      position: relative;
      border: 1px solid rgba(0,255,136,0.3);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0, 10, 5, 0.9);
    }

    .c-corner {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--green); border-style: solid; z-index: 3;
    }
    .c-tl { top: 6px; left: 6px;   border-width: 2px 0 0 2px; }
    .c-tr { top: 6px; right: 6px;  border-width: 2px 2px 0 0; }
    .c-bl { bottom: 6px; left: 6px;  border-width: 0 0 2px 2px; }
    .c-br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

    .scanlines {
      position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0.06) 0px, transparent 1px, transparent 3px
      );
    }

    canvas { display: block; }

    /* ── overlays ── */
    .overlay {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,8,3,0.93);
      gap: 0.75rem;
    }
    .overlay.hidden { display: none; }

    .overlay-title {
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 30px var(--green);
    }
    .overlay-sub {
      font-size: 0.55rem; letter-spacing: 0.3em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }
    .overlay-score {
      font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--pink); text-shadow: 0 0 15px var(--pink);
    }
    .overlay-best {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
      color: var(--yellow); text-shadow: 0 0 10px var(--yellow);
    }

    .divider-line {
      width: 160px; height: 1px;
      background: linear-gradient(to right, transparent, var(--green), transparent);
      opacity: 0.4;
    }

    .btn {
      margin-top: 0.4rem;
      padding: 0.6rem 2rem;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .btn:hover {
      background: var(--green); color: var(--bg);
      box-shadow: 0 0 20px var(--green);
    }

    /* ── bottom bar ── */
    .bottom-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 460px; max-width: 96vw;
    }
    .level-display {
      font-size: 0.45rem; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.25); text-transform: uppercase;
    }
    .speed-bar-wrap {
      display: flex; align-items: center; gap: 0.5rem;
    }
    .speed-label {
      font-size: 0.4rem; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25); text-transform: uppercase;
    }
    .speed-track {
      width: 80px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .speed-fill {
      height: 100%; background: var(--green);
      box-shadow: 0 0 6px var(--green);
      transition: width 0.3s, background 0.3s;
      border-radius: 2px;
    }

    .back-link {
      font-size: 0.48rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); text-decoration: none; transition: color 0.15s;
    }
    .back-link:hover { color: var(--pink); }

    /* ── touch d-pad ── */
    .dpad {
      display: none;
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 10;
    }
    @media (pointer: coarse) { .dpad { display: grid; } }
    .dpad {
      grid-template-columns: 44px 44px 44px;
      grid-template-rows: 44px 44px 44px;
      gap: 4px;
    }
    .dpad-btn {
      background: rgba(0,255,136,0.08);
      border: 1px solid rgba(0,255,136,0.3);
      color: var(--green); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dpad-btn:active { background: rgba(0,255,136,0.2); }
    .dpad-up    { grid-column: 2; grid-row: 1; }
    .dpad-left  { grid-column: 1; grid-row: 2; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down  { grid-column: 2; grid-row: 3; }
  </style>
</head>
<body>
  <button id="mainMenuBtn" class="main-menu-btn">OTHER GAMES</button>
  <div class="stars"></div>
  <div class="sun">
    <div class="sun-stripe"></div><div class="sun-stripe"></div>
    <div class="sun-stripe"></div><div class="sun-stripe"></div>
  </div>
  <div class="grid-floor"></div>

  
  <div class="game-wrapper">

    <div class="header-bar">
      <span class="game-title">NEON SERPENT</span>
      <div class="score-board">
        <div class="score-item">
          <div class="score-label">Score</div>
          <div class="score-value" id="scoreDisplay">0</div>
        </div>
        <div class="score-item">
          <div class="score-label">Best</div>
          <div class="score-value" id="bestDisplay">0</div>
        </div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <div class="c-corner c-tl"></div><div class="c-corner c-tr"></div>
      <div class="c-corner c-bl"></div><div class="c-corner c-br"></div>
      <div class="scanlines"></div>
      <canvas id="gameCanvas" width="460" height="460"></canvas>

      <!-- START -->
      <div class="overlay" id="startScreen">
        <div class="overlay-title">NEON SERPENT</div>
        <div class="divider-line"></div>
        <div class="overlay-sub">eat · grow · don't die</div>
        <div class="overlay-sub" style="margin-top:0.2rem">↑ ↓ ← → arrow keys &nbsp;|&nbsp; WASD</div>
        <button class="btn" id="startBtn">INITIALISE ▶</button>
        <div class="overlay-sub" style="margin-top:0.2rem; font-size:0.4rem">speed increases with every food consumed</div>
      </div>

      <!-- GAME OVER -->
      <div class="overlay hidden" id="gameOverScreen">
        <div class="overlay-title" style="color:var(--pink);text-shadow:0 0 30px var(--pink)">FLATLINED</div>
        <div class="divider-line" style="background:linear-gradient(to right,transparent,var(--pink),transparent)"></div>
        <div class="overlay-score" id="finalScore"></div>
        <div class="overlay-best" id="finalBest"></div>
        <div class="overlay-sub" id="deathReason" style="color:rgba(255,110,199,0.5)"></div>
        <button class="btn" style="border-color:var(--pink);color:var(--pink)" id="restartBtn">RESPAWN ▶</button>
        <a href="index.html" class="back-link" style="margin-top:0.3rem">◂ back to hangar</a>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="level-display" id="lengthDisplay">LENGTH: 3</div>
      <div class="speed-bar-wrap">
        <div class="speed-label">SPEED</div>
        <div class="speed-track">
          <div class="speed-fill" id="speedFill" style="width:5%"></div>
        </div>
      </div>
    </div>

    <a href="index.html" class="back-link">◂ return to hangar</a>
  </div>

  <!-- d-pad for touch -->
  <div class="dpad">
    <div class="dpad-btn dpad-up"    id="dUp">▲</div>
    <div class="dpad-btn dpad-left"  id="dLeft">◀</div>
    <div class="dpad-btn dpad-right" id="dRight">▶</div>
    <div class="dpad-btn dpad-down"  id="dDown">▼</div>
  </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// grid
const CELL = 20;
const COLS = W / CELL; // 23
const ROWS = H / CELL; // 23
document.getElementById("mainMenuBtn").addEventListener("click", () => {
    window.location.href = "index.html";
});

// ── state ──
let snake, dir, inputQueue, food, score, best, gameState, tickInterval, tickMs, particles, foodPulse, bonusFood;

best = parseInt(localStorage.getItem('neonserpent_best') || '0');
document.getElementById('bestDisplay').textContent = best;

// ── colours ──
const FOOD_COLORS  = ['#ff6ec7', '#ffff00', '#b400ff', '#ff9900'];
const SNAKE_HEAD   = '#00ff88';
const SNAKE_BODY   = '#00cc66';

// ── helpers ──
function rndCell() {
  return { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
}

function placeFood() {
  let pos;
  do { pos = rndCell(); }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return { ...pos, color: FOOD_COLORS[Math.floor(Math.random() * FOOD_COLORS.length)], pulse: 0 };
}

function placeBonusFood() {
  if (score > 0 && score % 5 === 0 && Math.random() < 0.6) {
    let pos;
    do { pos = rndCell(); }
    while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food && pos.x === food.x && pos.y === food.y));
    bonusFood = { ...pos, color: '#ffff00', pulse: 0, ttl: 80 };
  }
}

function burst(cx, cy, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.2 + Math.random() * 2.5;
    particles.push({
      x: cx * CELL + CELL / 2, y: cy * CELL + CELL / 2,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: 0.05 + Math.random() * 0.04,
      r: 2 + Math.random() * 2.5, color,
    });
  }
}

// ── init game ──
function initGame() {
  const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
  snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
  dir = { x: 1, y: 0 };
  inputQueue = [];
  score = 0;
  particles = [];
  bonusFood = null;
  food = placeFood();
  tickMs = 160;
  updateUI();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  gameState = 'playing';
  clearInterval(tickInterval);
  tickInterval = setInterval(tick, tickMs);
}

// ── tick (game logic) ──
function tick() {
  if (gameState !== 'playing') return;

  // consume next queued input (only if it doesn't reverse direction)
  while (inputQueue.length > 0) {
    const candidate = inputQueue.shift();
    if (candidate.x !== -dir.x || candidate.y !== -dir.y) {
      dir = candidate;
      break;
    }
  }
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    die('hit the boundary'); return;
  }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die('bit itself'); return;
  }

  snake.unshift(head);

  // eat normal food
  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    burst(food.x, food.y, food.color, 14);
    score++;
    food = placeFood();
    placeBonusFood();
    ate = true;
    // speed up every food
    tickMs = Math.max(60, tickMs - 3);
    clearInterval(tickInterval);
    tickInterval = setInterval(tick, tickMs);
  }

  // eat bonus food
  if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
    burst(bonusFood.x, bonusFood.y, '#ffff00', 20);
    score += 3;
    bonusFood = null;
    ate = true;
  }

  if (!ate) snake.pop();

  updateUI();
}

function die(reason) {
  clearInterval(tickInterval);
  gameState = 'dead';
  burst(snake[0].x, snake[0].y, '#ff6ec7', 20);

  if (score > best) {
    best = score;
    localStorage.setItem('neonserpent_best', best);
  }
  document.getElementById('bestDisplay').textContent = best;
  document.getElementById('finalScore').textContent  = `SCORE: ${score}`;
  document.getElementById('finalBest').textContent   = score >= best && score > 0 ? '★ NEW BEST ★' : `BEST: ${best}`;
  document.getElementById('deathReason').textContent = reason.toUpperCase();
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('lengthDisplay').textContent = `LENGTH: ${snake.length}`;
  const pct = Math.min(100, ((160 - tickMs) / 100) * 100);
  const fill = document.getElementById('speedFill');
  fill.style.width = Math.max(5, pct) + '%';
  // colour shifts from green → yellow → pink as speed increases
  if (pct < 40)       fill.style.background = 'var(--green)';
  else if (pct < 75)  fill.style.background = 'var(--yellow)';
  else                fill.style.background = 'var(--pink)';
}

// ── draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // bg
  ctx.fillStyle = 'rgba(0,8,3,0.95)';
  ctx.fillRect(0, 0, W, H);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,255,136,0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  if (gameState === 'idle') return;

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fill();
    ctx.restore();
  }

  // food
  if (food) {
    food.pulse = (food.pulse || 0) + 0.08;
    const fp = Math.sin(food.pulse) * 0.3 + 0.7;
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.save();
    ctx.shadowColor = food.color; ctx.shadowBlur = 18 * fp;
    ctx.fillStyle = food.color;
    ctx.globalAlpha = fp;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL * 0.38, 0, Math.PI * 2);
    ctx.fill();
    // inner bright dot
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }

  // bonus food
  if (bonusFood) {
    bonusFood.pulse = (bonusFood.pulse || 0) + 0.14;
    bonusFood.ttl--;
    if (bonusFood.ttl <= 0) { bonusFood = null; }
    else {
      const bx = bonusFood.x * CELL + CELL / 2;
      const by = bonusFood.y * CELL + CELL / 2;
      const bp = Math.sin(bonusFood.pulse) * 0.4 + 0.6;
      ctx.save();
      ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 22 * bp;
      ctx.fillStyle = '#ffff00';
      ctx.globalAlpha = bp * (bonusFood.ttl / 80);
      // star shape
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const a2 = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
        if (i === 0) ctx.moveTo(bx + Math.cos(a) * CELL * 0.42, by + Math.sin(a) * CELL * 0.42);
        else         ctx.lineTo(bx + Math.cos(a) * CELL * 0.42, by + Math.sin(a) * CELL * 0.42);
        ctx.lineTo(bx + Math.cos(a2) * CELL * 0.2, by + Math.sin(a2) * CELL * 0.2);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // snake
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const t = 1 - i / snake.length;
    const sx = seg.x * CELL, sy = seg.y * CELL;
    const pad = isHead ? 1 : 2;

    ctx.save();
    ctx.shadowColor = SNAKE_HEAD;
    ctx.shadowBlur = isHead ? 16 : 8 * t;
    ctx.fillStyle = isHead ? SNAKE_HEAD : `rgba(0,${Math.floor(180 * t + 50)},${Math.floor(80 * t + 20)},${0.5 + 0.5 * t})`;
    ctx.fillRect(sx + pad, sy + pad, CELL - pad * 2, CELL - pad * 2);

    if (isHead) {
      // eyes
      const ex = dir.x, ey = dir.y;
      const eyeOffX = ey !== 0 ? 4 : 0;
      const eyeOffY = ex !== 0 ? 4 : 0;
      ctx.fillStyle = '#001a0a';
      ctx.shadowBlur = 0;
      [[eyeOffX, -eyeOffY], [-eyeOffX, eyeOffY]].forEach(([ox, oy]) => {
        const ecx = sx + CELL / 2 + ex * 4 + ox;
        const ecy = sy + CELL / 2 + ey * 4 + oy;
        ctx.beginPath();
        ctx.arc(ecx, ecy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
    }
    ctx.restore();
  });
}

// ── render loop ──
function loop() {
  draw();
  requestAnimationFrame(loop);
}

// ── input ──
const DIRS = {
  ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
  ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
  ArrowLeft:  { x:-1, y:  0 }, a: { x:-1, y:  0 }, A: { x:-1, y:  0 },
  ArrowRight: { x: 1, y:  0 }, d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
};

document.addEventListener('keydown', e => {
  const d = DIRS[e.key];
  if (d) {
    e.preventDefault();
    // only queue if not same direction and queue isn't already full (max 2 buffered)
    const last = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
    if ((d.x !== last.x || d.y !== last.y) && inputQueue.length < 2) {
      inputQueue.push(d);
    }
  }
  if ((e.key === ' ' || e.key === 'Enter') && gameState !== 'playing') initGame();
});

// d-pad
function bindDpad(id, key) {
  document.getElementById(id).addEventListener('touchstart', e => {
    e.preventDefault();
    const d = DIRS[key];
    if (d) {
      const last = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
      if ((d.x !== last.x || d.y !== last.y) && inputQueue.length < 2) inputQueue.push(d);
    }
    if (gameState !== 'playing') initGame();
  }, { passive: false });
}
bindDpad('dUp',    'ArrowUp');
bindDpad('dDown',  'ArrowDown');
bindDpad('dLeft',  'ArrowLeft');
bindDpad('dRight', 'ArrowRight');

// buttons
document.getElementById('startBtn').addEventListener('click', initGame);
document.getElementById('restartBtn').addEventListener('click', initGame);

// ── go ──
gameState = 'idle';
loop();
</script>
</body>
