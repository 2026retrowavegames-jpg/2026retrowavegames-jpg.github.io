<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOVA — Retrowave Games</title>
  <meta name="description" content="NOVA — twin-stick neon shooter. Survive the void. WASD + mouse."/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://2026retrowavegames-jpg.github.io/nova.html"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--cyan:#00ffff;--pink:#ff6ec7;--yellow:#ffff00;--green:#00ff88;--purple:#b400ff;--bg:#020008;}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
    body{font-family:'Orbitron',sans-serif;color:#fff;cursor:auto;}
    body.hide-cursor{cursor:none;}

    canvas{position:fixed;inset:0;display:block;}

    /* HUD */
    #hud{
      position:fixed;top:0;left:0;right:0;z-index:5;
      display:flex;align-items:flex-start;justify-content:space-between;
      padding:.8rem 1.2rem .4rem;
      pointer-events:none;
      background:linear-gradient(to bottom,rgba(2,0,8,.7) 0%,transparent 100%);
    }
    .hud-block{display:flex;flex-direction:column;gap:.15rem;}
    .hud-label{font-size:.38rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.3);}
    .hud-val{font-size:1.1rem;font-weight:900;letter-spacing:.05em;color:var(--cyan);text-shadow:0 0 12px var(--cyan);}
    .hud-val.pink{color:var(--pink);text-shadow:0 0 12px var(--pink);}
    .hud-val.yellow{color:var(--yellow);text-shadow:0 0 12px var(--yellow);}
    .hud-val.green{color:var(--green);text-shadow:0 0 12px var(--green);}

    /* lives */
    #lives-row{display:flex;gap:.4rem;align-items:center;margin-top:.1rem;}
    .life-dot{width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);transition:all .2s;}
    .life-dot.lost{background:rgba(255,255,255,.1);box-shadow:none;}

    /* multiplier flash */
    #mult-wrap{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      z-index:6;pointer-events:none;opacity:0;transition:opacity .1s;
      font-size:2.5rem;font-weight:900;letter-spacing:.1em;
      text-shadow:0 0 30px currentColor;text-align:center;}

    /* wave banner */
    #wave-banner{position:fixed;top:18%;left:50%;transform:translateX(-50%);
      z-index:6;pointer-events:none;opacity:0;transition:opacity .15s;
      font-size:1.2rem;font-weight:900;letter-spacing:.25em;text-transform:uppercase;
      color:var(--pink);text-shadow:0 0 25px var(--pink);}

    /* overlay screens */
    .screen{position:fixed;inset:0;z-index:10;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(2,0,8,.92);gap:.7rem;}
    .screen.off{display:none;}
    .sc-title{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;
      letter-spacing:.15em;text-transform:uppercase;
      color:var(--cyan);text-shadow:0 0 40px var(--cyan),0 0 80px rgba(0,255,255,.3);}
    .sc-sub{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.35);}
    .sc-score{font-size:1.3rem;font-weight:700;color:var(--pink);text-shadow:0 0 15px var(--pink);}
    .sc-best{font-size:.65rem;font-weight:700;color:var(--yellow);text-shadow:0 0 10px var(--yellow);letter-spacing:.15em;}
    .divider{width:180px;height:1px;background:linear-gradient(to right,transparent,var(--cyan),transparent);opacity:.4;}
    .btn{padding:.65rem 2.2rem;background:transparent;border:1px solid var(--cyan);
      color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:.65rem;
      font-weight:700;letter-spacing:.25em;text-transform:uppercase;
      cursor:pointer;transition:all .15s;pointer-events:all;}
    .btn:hover{background:var(--cyan);color:var(--bg);box-shadow:0 0 25px var(--cyan);}
    .controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;margin:.2rem 0;}
    .ctrl{font-size:.4rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);}
    .ctrl span{color:rgba(255,255,255,.6);}
    .back-link{font-size:.44rem;letter-spacing:.2em;text-transform:uppercase;
      color:rgba(255,255,255,.2);text-decoration:none;transition:color .15s;pointer-events:all;}
    .back-link:hover{color:var(--pink);}
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="hScr">0</div>
  </div>
  <div class="hud-block" style="align-items:center">
    <div class="hud-label">Lives</div>
    <div id="lives-row">
      <div class="life-dot" id="l0"></div>
      <div class="life-dot" id="l1"></div>
      <div class="life-dot" id="l2"></div>
    </div>
  </div>
  <div class="hud-block" style="align-items:center">
    <div class="hud-label">Multiplier</div>
    <div class="hud-val yellow" id="hMult">×1</div>
  </div>
  <div class="hud-block" style="align-items:center">
    <div class="hud-label">Wave</div>
    <div class="hud-val green" id="hWave">1</div>
  </div>
  <div class="hud-block" style="align-items:flex-end">
    <div class="hud-label">Best</div>
    <div class="hud-val pink" id="hBest">0</div>
  </div>
</div>

<div id="mult-wrap"></div>
<div id="wave-banner"></div>

<!-- START -->
<div class="screen" id="startScreen">
  <div class="sc-title">NOVA</div>
  <div class="divider"></div>
  <div class="sc-sub">twin-stick neon shooter · survive the void</div>
  <div class="controls-grid">
    <div class="ctrl"><span>WASD</span> — move</div>
    <div class="ctrl"><span>MOUSE</span> — aim</div>
    <div class="ctrl"><span>AUTO-FIRE</span> — always on</div>
    <div class="ctrl"><span>SHIFT</span> — speed burst</div>
  </div>
  <button class="btn" id="startBtn">ENGAGE ▶</button>
  <a href="index.html" class="back-link">◂ back to hangar</a>
</div>

<!-- GAME OVER -->
<div class="screen off" id="gameOverScreen">
  <div class="sc-title" style="color:var(--pink);text-shadow:0 0 40px var(--pink)">NOVA COLLAPSED</div>
  <div class="divider" style="background:linear-gradient(to right,transparent,var(--pink),transparent)"></div>
  <div class="sc-score" id="goScore"></div>
  <div class="sc-best" id="goBest"></div>
  <button class="btn" id="retryBtn" style="border-color:var(--pink);color:var(--pink)">REBOOT ▶</button>
  <a href="index.html" class="back-link">◂ back to hangar</a>
</div>

<script>
// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let best = parseInt(localStorage.getItem('nova_best') || '0');
document.getElementById('hBest').textContent = best;

// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const FIRE_RATE    = 110;   // ms between shots
const BULLET_SPD   = 14;
const INVINCIBLE   = 120;   // frames
const MULT_DECAY   = 180;   // frames before multiplier drops
const GRID_COLS    = 36;
const GRID_ROWS    = 26;

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let gameState = 'idle';
let score, lives, multiplier, multTimer, wave, waveTimer, waveActive;
let enemies, bullets, particles, ripples;
let ship;
let lastFire, animFrame, frameCount;
let screenShake, shakeDecay;

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'sine', volume = 0.3, attack = 0.01, decay = 0.1) {
  const osc = audioCtx.createOscillator();
  const amp = audioCtx.createGain();
  osc.connect(amp);
  amp.connect(audioCtx.destination);
  
  osc.type = type;
  osc.frequency.value = freq;
  amp.gain.setValueAtTime(volume, audioCtx.currentTime);
  amp.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

function soundFire() {
  // Soft, low-volume square blip
  playSound(480, 0.07, 'square', 0.10, 0.004, 0.03);

  // Gentle pitch dip, barely noticeable
  playSound(360, 0.05, 'square', 0.08, 0.004, 0.025);

  // Very light noise tick (almost inaudible)
  playSound(0, 0.03, 'noise', 0.05, 0.001, 0.015);
}



function soundHit() {
  playSound(400, 0.08, 'sine', 0.2, 0.005, 0.07);
  playSound(300, 0.06, 'sine', 0.15, 0.005, 0.05);
}

function soundExplode() {
  playSound(200, 0.15, 'triangle', 0.25, 0.01, 0.12);
  playSound(300, 0.12, 'triangle', 0.2, 0.01, 0.1);
  playSound(150, 0.18, 'sine', 0.15, 0.01, 0.15);
}

function soundDamage() {
  playSound(600, 0.05, 'sine', 0.25, 0.01, 0.04);
  playSound(400, 0.08, 'sine', 0.2, 0.01, 0.06);
  playSound(200, 0.1, 'sine', 0.15, 0.01, 0.08);
}

function soundWave() {
  playSound(600, 0.1, 'sine', 0.2, 0.01, 0.08);
  playSound(800, 0.1, 'sine', 0.2, 0.05, 0.08);
  playSound(1000, 0.1, 'sine', 0.2, 0.1, 0.08);
}

// ══════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════
const keys = {};
const mouse = { x: 0, y: 0 };
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup',   e => { keys[e.key] = false; });
document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

// ══════════════════════════════════════════
// GRID RIPPLE SYSTEM
// ══════════════════════════════════════════
function addRipple(x, y, strength, speed) {
  ripples.push({ x, y, r: 0, strength: strength||30, speed: speed||4, age: 0, maxR: 300 });
}

function getDisplacement(bx, by) {
  let dx = 0, dy = 0;
  for (const rip of ripples) {
    const dist = Math.hypot(bx - rip.x, by - rip.y);
    const waveDist = Math.abs(dist - rip.r);
    const waveW = 55;
    if (waveDist < waveW) {
      const str = (1 - waveDist / waveW) * rip.strength * (1 - rip.age);
      const angle = Math.atan2(by - rip.y, bx - rip.x);
      dx += Math.cos(angle) * str;
      dy += Math.sin(angle) * str;
    }
  }
  return [dx, dy];
}

function drawGrid() {
  const cw = W / GRID_COLS;
  const ch = H / GRID_ROWS;

  // color shifts by multiplier
  const multPct = Math.min(1, (multiplier - 1) / 9);
  const r = Math.floor(0   + multPct * 100);
  const g = Math.floor(255 - multPct * 155);
  const b = Math.floor(255 - multPct * 100);
  const gridColor = `rgba(${r},${g},${b},`;

  // horizontal lines
  ctx.lineWidth = 0.5;
  for (let row = 0; row <= GRID_ROWS; row++) {
    ctx.beginPath();
    ctx.strokeStyle = `${gridColor}${0.06 + multPct * 0.06})`;
    for (let col = 0; col <= GRID_COLS; col++) {
      const bx = col * cw, by = row * ch;
      const [ddx, ddy] = getDisplacement(bx, by);
      if (col === 0) ctx.moveTo(bx + ddx, by + ddy);
      else           ctx.lineTo(bx + ddx, by + ddy);
    }
    ctx.stroke();
  }
  // vertical lines
  for (let col = 0; col <= GRID_COLS; col++) {
    ctx.beginPath();
    ctx.strokeStyle = `${gridColor}${0.06 + multPct * 0.06})`;
    for (let row = 0; row <= GRID_ROWS; row++) {
      const bx = col * cw, by = row * ch;
      const [ddx, ddy] = getDisplacement(bx, by);
      if (row === 0) ctx.moveTo(bx + ddx, by + ddy);
      else           ctx.lineTo(bx + ddx, by + ddy);
    }
    ctx.stroke();
  }
}

// ══════════════════════════════════════════
// SHIP
// ══════════════════════════════════════════
function createShip() {
  return {
    x: W / 2, y: H / 2,
    vx: 0, vy: 0,
    angle: 0,
    invincible: 0,
    trail: [],
    speed: 4.5,
    size: 12,
  };
}

function updateShip() {
  const spd = (keys['Shift'] || keys['ShiftLeft']) ? ship.speed * 1.65 : ship.speed;
  if (keys['w'] || keys['W'] || keys['ArrowUp'])    ship.vy -= 0.7;
  if (keys['s'] || keys['S'] || keys['ArrowDown'])  ship.vy += 0.7;
  if (keys['a'] || keys['A'] || keys['ArrowLeft'])  ship.vx -= 0.7;
  if (keys['d'] || keys['D'] || keys['ArrowRight']) ship.vx += 0.7;

  // friction
  ship.vx *= 0.84;
  ship.vy *= 0.84;

  // clamp speed
  const spd2 = Math.hypot(ship.vx, ship.vy);
  if (spd2 > spd) { ship.vx = ship.vx / spd2 * spd; ship.vy = ship.vy / spd2 * spd; }

  ship.x = Math.max(ship.size, Math.min(W - ship.size, ship.x + ship.vx));
  ship.y = Math.max(ship.size, Math.min(H - ship.size, ship.y + ship.vy));

  // aim at mouse
  ship.angle = Math.atan2(mouse.y - ship.y, mouse.x - ship.x);

  // trail
  ship.trail.unshift({ x: ship.x, y: ship.y, vx: ship.vx, vy: ship.vy });
  if (ship.trail.length > 14) ship.trail.pop();

  if (ship.invincible > 0) ship.invincible--;
}

function drawShip() {
  if (!ship) return;
  const alpha = ship.invincible > 0 ? (Math.floor(ship.invincible / 5) % 2 === 0 ? 0.3 : 1) : 1;

  // thruster trail
  ship.trail.forEach((t, i) => {
    const a = (1 - i / ship.trail.length) * 0.3 * alpha;
    const moving = Math.hypot(t.vx, t.vy) > 0.5;
    if (!moving) return;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ship.size * (1 - i / ship.trail.length) * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ff6ec7';
    ctx.shadowColor = '#ff6ec7'; ctx.shadowBlur = 10;
    ctx.fill();
    ctx.restore();
  });

  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);
  ctx.globalAlpha = alpha;

  // outer glow
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, ship.size * 2.5);
  grad.addColorStop(0, 'rgba(0,255,255,0.15)');
  grad.addColorStop(1, 'rgba(0,255,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, ship.size * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // ship body
  ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 20;
  ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(ship.size, 0);
  ctx.lineTo(-ship.size * 0.7,  ship.size * 0.65);
  ctx.lineTo(-ship.size * 0.35, 0);
  ctx.lineTo(-ship.size * 0.7, -ship.size * 0.65);
  ctx.closePath();
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,255,255,0.08)';
  ctx.fill();

  // cockpit dot
  ctx.beginPath();
  ctx.arc(ship.size * 0.3, 0, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffff'; ctx.shadowBlur = 10;
  ctx.fill();

  ctx.restore();
}

// ══════════════════════════════════════════
// BULLETS
// ══════════════════════════════════════════
function fireBullet() {
  const now = Date.now();
  if (now - lastFire < FIRE_RATE) return;
  lastFire = now;
  soundFire();
  const dx = mouse.x - ship.x, dy = mouse.y - ship.y;
  const len = Math.hypot(dx, dy) || 1;
  // slight spread
  const spread = 0.04;
  const ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * spread;
  bullets.push({
    x: ship.x + Math.cos(ang) * 18,
    y: ship.y + Math.sin(ang) * 18,
    vx: Math.cos(ang) * BULLET_SPD,
    vy: Math.sin(ang) * BULLET_SPD,
    life: 1,
    trail: [],
  });
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.unshift({ x: b.x, y: b.y });
    if (b.trail.length > 5) b.trail.pop();
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
      bullets.splice(i, 1);
    }
  }
}

function drawBullets() {
  // color by multiplier
  const multPct = Math.min(1, (multiplier - 1) / 9);
  const hue = Math.floor(180 - multPct * 180); // cyan to red
  const bColor = `hsl(${hue},100%,70%)`;
  const bGlow  = `hsl(${hue},100%,60%)`;

  bullets.forEach(b => {
    // trail
    b.trail.forEach((t, i) => {
      ctx.save();
      ctx.globalAlpha = (1 - i / b.trail.length) * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2.5 - i * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = bColor; ctx.shadowColor = bGlow; ctx.shadowBlur = 6;
      ctx.fill();
      ctx.restore();
    });
    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = bGlow; ctx.shadowBlur = 14;
    ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════════
// ENEMIES
// ══════════════════════════════════════════
const ENEMY_DEFS = {
  drifter:  { hp:1, speed:1.3, size:11, color:'#00ffff', pts:100, sides:4 },
  splitter: { hp:2, speed:1.4, size:13, color:'#ffff00', pts:200, sides:4 },
  splitter2:{ hp:1, speed:2.8, size:7,  color:'#ffff00', pts:75,  sides:4 },
  swarmer:  { hp:1, speed:3.2, size:7,  color:'#00ff88', pts:50,  sides:3 },
  sniper:   { hp:2, speed:1.0, size:10, color:'#ff9900', pts:150, sides:5 },
  tank:     { hp:6, speed:0.55,size:22, color:'#b400ff', pts:600, sides:6 },
};

function spawnEnemy(type, x, y) {
  const def = ENEMY_DEFS[type];
  const e = {
    type, x, y,
    vx: 0, vy: 0,
    hp: def.hp, maxHp: def.hp,
    speed: def.speed, size: def.size,
    color: def.color, pts: def.pts, sides: def.sides,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    hitFlash: 0,
    zigzag: Math.random() < 0.4 ? (Math.random() * 2 - 1) : 0, // for snipers
    zigTimer: 0,
  };
  return e;
}

function spawnEdge() {
  const side = Math.floor(Math.random() * 4);
  const margin = 30;
  if (side === 0) return { x: Math.random() * W, y: -margin };
  if (side === 1) return { x: W + margin, y: Math.random() * H };
  if (side === 2) return { x: Math.random() * W, y: H + margin };
  return { x: -margin, y: Math.random() * H };
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.rot += e.rotSpeed;
    if (e.hitFlash > 0) e.hitFlash--;

    const dx = ship.x - e.x, dy = ship.y - e.y;
    const dist = Math.hypot(dx, dy) || 1;

    if (e.type === 'sniper') {
      // orbit + strafe
      e.zigTimer++;
      const orbitR = 200;
      const orbitAng = Math.atan2(dy, dx) + Math.PI / 2 + e.zigzag * Math.sin(e.zigTimer * 0.03);
      const targetX = ship.x + Math.cos(orbitAng + Math.PI) * orbitR;
      const targetY = ship.y + Math.sin(orbitAng + Math.PI) * orbitR;
      const tdx = targetX - e.x, tdy = targetY - e.y;
      const tlen = Math.hypot(tdx, tdy) || 1;
      e.vx += (tdx / tlen) * 0.25;
      e.vy += (tdy / tlen) * 0.25;
    } else {
      // chase
      e.vx += (dx / dist) * 0.3;
      e.vy += (dy / dist) * 0.3;
    }

    // clamp speed
    const spd = Math.hypot(e.vx, e.vy);
    if (spd > e.speed) { e.vx = e.vx / spd * e.speed; e.vy = e.vy / spd * e.speed; }

    e.x += e.vx; e.y += e.vy;

    // collision with ship
    if (ship.invincible === 0 && dist < e.size + ship.size - 4) {
      hitPlayer();
    }
  }
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.rot);

    const flash = e.hitFlash > 0;
    const col = flash ? '#ffffff' : e.color;

    // glow
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, e.size * 2);
    grad.addColorStop(0, col + '33');
    grad.addColorStop(1, col + '00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, e.size * 2, 0, Math.PI * 2); ctx.fill();

    // HP bar for tanks
    if (e.type === 'tank' && e.hp < e.maxHp) {
      const pct = e.hp / e.maxHp;
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(-e.size, e.size + 5, e.size * 2, 4);
      ctx.fillStyle = e.color;
      ctx.fillRect(-e.size, e.size + 5, e.size * 2 * pct, 4);
    }

    // polygon body
    ctx.beginPath();
    for (let i = 0; i < e.sides; i++) {
      const a = (Math.PI * 2 / e.sides) * i;
      if (i === 0) ctx.moveTo(Math.cos(a) * e.size, Math.sin(a) * e.size);
      else         ctx.lineTo(Math.cos(a) * e.size, Math.sin(a) * e.size);
    }
    ctx.closePath();
    ctx.strokeStyle = col; ctx.lineWidth = flash ? 2.5 : 1.5;
    ctx.shadowColor = col; ctx.shadowBlur = flash ? 20 : 10;
    ctx.stroke();
    ctx.fillStyle = col + '18';
    ctx.fill();

    ctx.restore();
  });
}

// ══════════════════════════════════════════
// BULLET ↔ ENEMY COLLISION
// ══════════════════════════════════════════
function checkBulletCollisions() {
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + 3) {
        soundHit();
        e.hp--;
        e.hitFlash = 6;
        addRipple(b.x, b.y, 12, 5);
        spawnParticles(b.x, b.y, e.color, 5);
        if (e.hp <= 0) {
          killEnemy(e, ei);
        }
        hit = true;
        break;
      }
    }
    if (hit) bullets.splice(bi, 1);
  }
}

function killEnemy(e, idx) {
  enemies.splice(idx, 1);
  soundExplode();
  score += e.pts * multiplier;
  // chain multiplier
  multiplier = Math.min(10, multiplier + 1);
  multTimer = MULT_DECAY;
  showMultiplier(multiplier);

  const blastSize = e.type === 'tank' ? 40 : e.size;
  addRipple(e.x, e.y, blastSize * 2.5, e.type === 'tank' ? 6 : 4);
  spawnParticles(e.x, e.y, e.color, e.type === 'tank' ? 28 : 12);
  if (e.type === 'tank') {
    screenShake = 16;
    addRipple(e.x, e.y, 80, 3); // double ripple for tanks
  }

  // splitter
  if (e.type === 'splitter') {
    for (let i = 0; i < 2; i++) {
      const off = (i === 0 ? 1 : -1) * e.size;
      enemies.push(spawnEnemy('splitter2', e.x + off, e.y + off));
    }
  }

  document.getElementById('hScr').textContent = score;
  document.getElementById('hMult').textContent = `×${multiplier}`;
  if (score > best) {
    best = score;
    localStorage.setItem('nova_best', best);
    document.getElementById('hBest').textContent = best;
  }
}

// ══════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 4.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 1, decay: 0.025 + Math.random() * 0.03,
      r: 1.5 + Math.random() * 3, color,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.93; p.vy *= 0.93;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();
  });
}

// ══════════════════════════════════════════
// PLAYER HIT
// ══════════════════════════════════════════
function hitPlayer() {
  lives--;
  soundDamage();
  ship.invincible = INVINCIBLE;
  multiplier = 1; multTimer = 0;
  document.getElementById('hMult').textContent = '×1';
  screenShake = 22;
  addRipple(ship.x, ship.y, 60, 8);
  spawnParticles(ship.x, ship.y, '#00ffff', 20);
  updateLivesUI();
  if (lives <= 0) endGame();
}

function updateLivesUI() {
  for (let i = 0; i < 3; i++) {
    document.getElementById('l' + i).classList.toggle('lost', i >= lives);
  }
}

// ══════════════════════════════════════════
// WAVE SPAWNING
// ══════════════════════════════════════════
const WAVE_DEFS = [
  // wave 1
  [{ type:'drifter', count:5 }],
  // wave 2
  [{ type:'drifter', count:6 }, { type:'splitter', count:2 }],
  // wave 3
  [{ type:'swarmer', count:12 }, { type:'drifter', count:4 }],
  // wave 4
  [{ type:'splitter', count:4 }, { type:'sniper', count:2 }],
  // wave 5
  [{ type:'tank', count:1 }, { type:'drifter', count:8 }],
  // wave 6+  (procedural)
];

function spawnWave(waveNum) {
  const idx = Math.min(waveNum - 1, WAVE_DEFS.length - 1);
  let def = WAVE_DEFS[idx];

  // procedural after wave 5
  if (waveNum > 5) {
    const extra = waveNum - 5;
    def = [
      { type:'drifter',  count: 4 + extra * 2 },
      { type:'splitter', count: 1 + Math.floor(extra / 2) },
      { type:'swarmer',  count: 6 + extra },
      { type:'sniper',   count: Math.floor(extra / 2) },
    ];
    if (waveNum % 3 === 0) def.push({ type:'tank', count: 1 + Math.floor(extra / 4) });
  }

  def.forEach(({ type, count }) => {
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const pos = spawnEdge();
        enemies.push(spawnEnemy(type, pos.x, pos.y));
      }, i * 180 + Math.random() * 100);
    }
  });

  soundWave();
  waveActive = true;
  showWaveBanner(waveNum);
  document.getElementById('hWave').textContent = waveNum;
}

function showWaveBanner(n) {
  const el = document.getElementById('wave-banner');
  el.textContent = `WAVE ${n}`;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 1800);
}

function showMultiplier(m) {
  if (m <= 2) return;
  const el = document.getElementById('mult-wrap');
  el.textContent = `×${m}`;
  el.style.color = m >= 8 ? '#ff6ec7' : m >= 5 ? '#ffff00' : '#00ff88';
  el.style.opacity = '1';
  clearTimeout(el._to);
  el._to = setTimeout(() => { el.style.opacity = '0'; }, 600);
}

// ══════════════════════════════════════════
// CURSOR
// ══════════════════════════════════════════
function drawCursor() {
  const x = mouse.x, y = mouse.y;
  const r = 10, gap = 4;
  const multPct = Math.min(1, (multiplier - 1) / 9);
  const col = `hsl(${Math.floor(180 - multPct * 180)},100%,70%)`;

  ctx.save();
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.shadowColor = col; ctx.shadowBlur = 10;
  // crosshair
  ctx.beginPath(); ctx.moveTo(x - r, y); ctx.lineTo(x - gap, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + gap, y); ctx.lineTo(x + r, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y - r); ctx.lineTo(x, y - gap); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + gap); ctx.lineTo(x, y + r); ctx.stroke();
  // dot
  ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.fill();
  ctx.restore();
}

// ══════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════
function update() {
  frameCount++;

  // screen shake
  if (screenShake > 0) screenShake *= 0.8;

  // multiplier decay
  if (multTimer > 0) {
    multTimer--;
    if (multTimer === 0) {
      multiplier = 1;
      document.getElementById('hMult').textContent = '×1';
    }
  }

  updateShip();
  if (gameState === 'playing') fireBullet();
  updateBullets();
  updateEnemies();
  checkBulletCollisions();
  updateParticles();

  // ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += r.speed;
    r.age = r.r / r.maxR;
    if (r.r > r.maxR) ripples.splice(i, 1);
  }

  // wave management
  if (waveActive && enemies.length === 0) {
    waveActive = false;
    waveTimer = frameCount + 160; // 2.5s pause
  }
  if (!waveActive && frameCount >= waveTimer && waveTimer > 0) {
    wave++;
    waveTimer = 0;
    spawnWave(wave);
  }
}

function draw() {
  // screen shake offset
  let ox = 0, oy = 0;
  if (screenShake > 0.5) {
    ox = (Math.random() - 0.5) * screenShake;
    oy = (Math.random() - 0.5) * screenShake;
  }

  ctx.save();
  ctx.translate(ox, oy);

  // background
  ctx.fillStyle = '#020008';
  ctx.fillRect(-ox, -oy, W, H);

  // vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(2,0,8,0.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(-ox, -oy, W, H);

  drawGrid();
  drawParticles();
  drawBullets();
  drawEnemies();
  if (gameState === 'playing' || gameState === 'dead') drawShip();
  drawCursor();

  ctx.restore();
}

function gameLoop() {
  if (gameState !== 'playing') return;
  update();
  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════
// INIT / END
// ══════════════════════════════════════════
function startGame() {
  score = 0; lives = 3; multiplier = 1; multTimer = 0;
  wave = 0; waveTimer = 60; waveActive = false; frameCount = 0;
  enemies = []; bullets = []; particles = []; ripples = [];
  screenShake = 0; lastFire = 0;
  ship = createShip();
  document.getElementById('hScr').textContent = '0';
  document.getElementById('hMult').textContent = '×1';
  document.getElementById('hWave').textContent = '1';
  updateLivesUI();

  document.getElementById('startScreen').classList.add('off');
  document.getElementById('gameOverScreen').classList.add('off');
  document.body.classList.add('hide-cursor');

  gameState = 'playing';
  cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameState = 'dead';
  document.body.classList.remove('hide-cursor');
  cancelAnimationFrame(animFrame);
  if (score > best) { best = score; localStorage.setItem('nova_best', best); }
  document.getElementById('goScore').textContent = `SCORE: ${score.toLocaleString()}`;
  document.getElementById('goBest').textContent = score >= best && score > 0 ? '★ NEW BEST ★' : `BEST: ${best.toLocaleString()}`;
  setTimeout(() => {
    document.getElementById('gameOverScreen').classList.remove('off');
  }, 900);
}

// idle draw loop (grid still animates)
function idleLoop() {
  if (gameState !== 'idle' && gameState !== 'dead') return;
  // gentle ripples
  if (Math.random() < 0.015) {
    addRipple(Math.random() * W, Math.random() * H, 15, 2.5);
  }
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i]; r.r += r.speed; r.age = r.r / r.maxR;
    if (r.r > r.maxR) ripples.splice(i, 1);
  }
  ctx.fillStyle = '#020008';
  ctx.fillRect(0, 0, W, H);
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'transparent'); vig.addColorStop(1,'rgba(2,0,8,0.65)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
  drawGrid();
  drawCursor();
  requestAnimationFrame(idleLoop);
}

// buttons
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && gameState === 'idle') startGame();
});

// init
gameState = 'idle';
score = 0; lives = 3; multiplier = 1; multTimer = 0;
enemies = []; bullets = []; particles = []; ripples = [];
screenShake = 0; frameCount = 0; waveTimer = 0; waveActive = false;
requestAnimationFrame(idleLoop);
</script>
