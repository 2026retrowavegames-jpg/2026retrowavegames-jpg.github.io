  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: #0a0015;
      min-height: 100vh;
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
 
    /* ── background layers ── */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 22%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 5%,  rgba(255,255,255,0.9) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 28%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 33% 42%, rgba(255,255,255,0.3) 0%, transparent 100%);
      z-index: 0;
      pointer-events: none;
    }
 
.grid-floor {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 50%;
  z-index: 0;
  pointer-events: none;

  /* base fade */
  background:
    linear-gradient(to bottom, transparent 0%, rgba(180,0,255,0.18) 100%),
    /* unified grid (one logical grid, two axes, same size) */
    linear-gradient(#00ffff33 1px, transparent 1px),
    linear-gradient(90deg, #00ffff33 1px, transparent 1px);

  background-size:
    100% 100%,   /* fade */
    40px 40px,   /* horizontal lines */
    40px 40px;   /* vertical lines */

  transform-origin: top center;
  transform: perspective(500px) rotateX(55deg);

  animation: grid-move 1.2s linear infinite;
}


 
    /* ── retro sun ── */
    .sun {
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #ff6ec7 0%, #ff9d00 55%, #ff6ec7 100%);
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }
    .sun-stripe {
      position: absolute;
      left: 0; right: 0;
      background: #0a0015;
    }
    .sun-stripe:nth-child(1) { top: 55%; height: 7px; }
    .sun-stripe:nth-child(2) { top: 68%; height: 9px; }
    .sun-stripe:nth-child(3) { top: 81%; height: 11px; }
    .sun-stripe:nth-child(4) { top: 94%; height: 14px; }
 
    /* ── main content ── */
    .content {
      position: relative;
      z-index: 2;
      padding: 0 1.5rem 6rem;
    }
 
    /* ── header ── */
    .header {
      text-align: center;
      padding-top: 2.5rem;
      margin-bottom: 2rem;
    }
 
    .title {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00ffff;
      text-shadow: 0 0 20px #00ffff, 0 0 60px rgba(0,255,255,0.4);
      line-height: 1.1;
    }
 
    .subtitle {
      font-size: clamp(0.5rem, 2vw, 0.75rem);
      letter-spacing: 0.45em;
      color: #ff6ec7;
      text-shadow: 0 0 10px #ff6ec7;
      margin-top: 0.6rem;
      text-transform: uppercase;
    }
 
    .divider {
      width: 100%;
      max-width: 800px;
      height: 1px;
      background: linear-gradient(to right, transparent, #00ffff, #ff6ec7, #00ffff, transparent);
      margin: 1.5rem auto;
      opacity: 0.5;
    }
 
    /* ── games grid ── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }
 
    /* ── game card ── */
    .game-card {
      position: relative;
      border: 1px solid rgba(0,255,255,0.3);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      background: rgba(0, 0, 30, 0.7);
      display: block;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
 
    .game-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #ff6ec7;
    }
 
    .game-card:hover .card-corner   { border-color: #ff6ec7; }
    .game-card:hover .card-label    { color: #ff6ec7; text-shadow: 0 0 12px #ff6ec7; }
 
    /* corner brackets */
    .card-corner {
      position: absolute;
      width: 12px; height: 12px;
      border-color: #00ffff;
      border-style: solid;
      z-index: 3;
      transition: border-color 0.15s ease;
    }
    .corner-tl { top: 5px;    left: 5px;  border-width: 2px 0 0 2px; }
    .corner-tr { top: 5px;    right: 5px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 5px; left: 5px;  border-width: 0 0 2px 2px; }
    .corner-br { bottom: 5px; right: 5px; border-width: 0 2px 2px 0; }
 
    /* preview area */
    .card-preview {
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
    }
 
    .card-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.12) 0px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 2;
    }
 
    /* card info */
    .card-info {
      padding: 0.6rem 0.75rem 0.8rem;
      border-top: 1px solid rgba(0,255,255,0.12);
    }
 
    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #00ffff;
      text-shadow: 0 0 8px rgba(0,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 3px;
      transition: color 0.15s, text-shadow 0.15s;
    }
 
    .card-desc {
      font-size: 0.55rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
 
    /* card bg themes */
    .bg1 { background: linear-gradient(135deg, #0a001f 0%, #1a0035 50%, #0d0028 100%); }
    .bg2 { background: linear-gradient(135deg, #001a1a 0%, #003333 50%, #001a2a 100%); }
    .bg3 { background: linear-gradient(135deg, #1a0010 0%, #330020 50%, #1a000d 100%); }
    .bg4 { background: linear-gradient(135deg, #0f0f00 0%, #252500 50%, #151500 100%); }
    .bg5 { background: linear-gradient(135deg, #001a00 0%, #003300 50%, #001500 100%); }
    .bg6 { background: linear-gradient(135deg, #1a0a00 0%, #331500 50%, #1a0d00 100%); }
 
    /* icon glow */
    .glow-cyan   { filter: drop-shadow(0 0 8px #00ffff); }
    .glow-pink   { filter: drop-shadow(0 0 8px #ff6ec7); }
    .glow-yellow { filter: drop-shadow(0 0 8px #ffff00); }
    .glow-green  { filter: drop-shadow(0 0 8px #00ff88); }
 
    /* NEW badge */
    .new-badge {
      position: absolute;
      top: 8px; right: 8px;
      background: #ff6ec7;
      color: #1a0010;
      font-size: 0.45rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 2px;
      text-transform: uppercase;
      z-index: 4;
    }
 
    /* ── footer ── */
    .footer-text {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.55rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

@keyframes grid-move {
  from {
    background-position:
      0 0,
      0 0,
      0 0;
  }
  to {
    background-position:
      0 0,        /* fade stays still */
      0 120px,    /* vertical lines loop perfectly */
      0 120px;    /* horizontal lines loop perfectly */
  }
}

.crt {
  position: relative;
  overflow: hidden;
}

.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 2px,
    transparent 4px
  );
  mix-blend-mode: overlay;
  animation: crt-flicker 0.12s infinite;
}

@keyframes crt-flicker {
  0%   { opacity: 0.15; }
  50%  { opacity: 0.25; }
  100% { opacity: 0.15; }
}
body {

body {

@keyframes bloom-pulse {

  50% {

  }
  75% {
    filter: drop-shadow(0 0 8px #00ffff66)
            drop-shadow(0 0 12px #ff00ff28);
  }
  100% {
    filter: drop-shadow(0 0 6px #00ffff55)
            drop-shadow(0 0 10px #ff00ff22);
  }
}

body {
  animation: bloom-pulse 4s ease-in-out infinite;
}
